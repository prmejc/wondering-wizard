# =============================================================================
# Wondering Wizard - DEV Settings
# =============================================================================
# Use different consumer group IDs to avoid stealing messages from production.
# Run locally with: SETTINGS_FILE=dev-settings.properties
# =============================================================================

# --- Server ---
server.port=8080

# --- Kafka Consumer ---
kafka.enabled=true

# Kafka broker connection (override for local dev)
kafka.bootstrap-server=kafka-broker-service:9093
kafka.client-id=fes-dev
kafka.schema-registry-url=http://kafka-schema-registry-service:8081

# SASL authentication
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# --- Consumer group IDs (suffixed with -dev to avoid conflicts) ---

# WorkQueue consumer
kafka.consumer.work-queue.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-queue.consumergroup.v1-dev
kafka.consumer.work-queue.read-all-at-startup=true

# WorkInstruction consumer
kafka.consumer.work-instruction.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-instruction.consumergroup.v1-dev
kafka.consumer.work-instruction.read-all-at-startup=true

# ContainerHandlingEquipment consumer
kafka.consumer.container-handling-equipment.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-che.consumergroup.v1-dev

# CheLogicalPosition consumer
kafka.consumer.che-logical-position.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-che-pos.consumergroup.v1-dev

# TerminalLayout (digital map) consumer
kafka.consumer.terminal-layout.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-digitalmap.consumergroup.v1-dev
kafka.consumer.terminal-layout.read-all-at-startup=true

# QuayCraneMapping consumer
kafka.consumer.quay-crane-mapping.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-qc-mapping.consumergroup.v1-dev
kafka.consumer.quay-crane-mapping.read-all-at-startup=true

# ContainerMoveState consumer
kafka.consumer.container-move-state.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-cms.consumergroup.v1-dev

# CraneDelayActivities consumer
kafka.consumer.crane-delay-activities.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-crane-delay.consumergroup.v1-dev

# CraneAvailabilityStatus consumer
kafka.consumer.crane-availability-status.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-crane-availability.consumergroup.v1-dev

# CraneReadiness consumer
kafka.consumer.crane-readiness.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-crane-readiness.consumergroup.v1-dev

# AssetEvent consumers (JSON)
kafka.consumer.asset-event-rtg.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-rtg.consumergroup.v1-dev
kafka.consumer.asset-event-qc.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-qc.consumergroup.v1-dev
kafka.consumer.asset-event-eh.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-eh.consumergroup.v1-dev

# CheTargetPositionConfirmation consumer
kafka.consumer.che-target-position.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-che-target-position.consumergroup.v1-dev

# Terminal code
kafka.terminal-code=MAPTM
