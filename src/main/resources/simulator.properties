# Kafka connection
kafka.bootstrap-server=kafka-broker-service:9093
kafka.schema-registry-url=http://kafka-schema-registry-service:8081
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# Consumer groups
kafka.consumer.group-id=apmt.tc1.sit.terminal-operations.terminal-simulator.consumergroup.v1
kafka.consumer.wi-group-id=apmt.tc1.sit.terminal-operations.terminal-simulator-wi.consumergroup.v1

# Topics — consumed (equipment instructions, Avro)
topic.equipment-instruction.qc=apmt.terminaloperations.equipmentinstruction.quaycrane.topic.confidential.dedicated.v1
topic.equipment-instruction.rtg=apmt.terminaloperations.equipmentinstruction.rubbertyredgantry.topic.confidential.dedicated.v1
topic.equipment-instruction.tt=apmt.terminaloperations.equipmentinstruction.terminaltruck.topic.confidential.dedicated.v1

# Topics — consumed (work instructions, Avro — for state tracking)
topic.work-instruction=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1

# Topics — produced (simulated responses, JSON)
topic.asset-event.qc=apmt.terminaloperations.assetevent.quaycrane.topic.confidential.dedicated.v1
topic.asset-event.rtg=apmt.terminaloperations.assetevent.rubbertyredgantry.topic.confidential.dedicated.v1
topic.asset-event.eh=apmt.terminaloperations.assetevent.emptyhandler.topic.confidential.dedicated.v1
topic.job-operation=apmt.terminaloperations.joboperation.topic.confidential.dedicated.v1
topic.che-target-position=apmt.terminaloperations.chetargetposition.topic.confidential.dedicated.v1

# Terminal
terminal.code=MAPTM
