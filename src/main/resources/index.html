<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wondering Wizard - Schedule Viewer</title>
<style>
  :root {
    --rtg-color: #3b82f6;
    --tt-color: #f59e0b;
    --qc-color: #22c55e;
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #475569;
    --pending: #64748b;
    --active: #3b82f6;
    --completed: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 280px 1fr 300px;
    grid-template-areas:
      "header header header"
      "left center right"
      "bottom bottom bottom";
    gap: 1px;
  }
  .panel { background: var(--surface); padding: 16px; overflow-y: auto; }
  h2 { font-size: 14px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px; }
  h3 { font-size: 13px; color: var(--text-muted); margin: 12px 0 6px; }
  button {
    background: var(--active); color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button:active { opacity: 0.8; }
  button.secondary { background: var(--surface2); color: var(--text); }
  button.complete-btn { background: var(--completed); font-size: 11px; padding: 3px 8px; }
  input, select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-size: 13px; width: 100%;
  }
  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; margin-top: 8px; }
  .form-group { margin-bottom: 6px; }
</style>
</head>
<body>

<schedule-header></schedule-header>
<event-panel></event-panel>
<schedule-view></schedule-view>
<timeline-panel></timeline-panel>
<side-effects-log></side-effects-log>

<script>
const API = window.location.pathname.replace(/\/$/, '');

async function apiCall(path, body) {
  const opts = body ? { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) } : {};
  const res = await fetch(API + path, opts);
  return res.json();
}

window._schedulePage = 0;
window._schedulePageSize = 5;

async function refreshState() {
  const state = await apiCall('/api/state?schedulePage=' + window._schedulePage + '&schedulePageSize=' + window._schedulePageSize);
  window._lastState = state;
  document.querySelectorAll('[data-refresh]').forEach(el => el.refresh(state));
}

// --- SSE live connection ---
let _sseStatus = 'disconnected'; // 'connected' | 'disconnected' | 'reconnecting'
function updateConnectionIndicator() {
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  if (!dot || !label) return;
  if (_sseStatus === 'connected') {
    dot.style.background = '#22c55e';
    label.textContent = 'Live';
  } else if (_sseStatus === 'reconnecting') {
    dot.style.background = '#f59e0b';
    label.textContent = 'Reconnecting';
  } else {
    dot.style.background = '#ef4444';
    label.textContent = 'Disconnected';
  }
}

function connectSSE() {
  const es = new EventSource(API + '/api/events');
  es.onopen = () => {
    _sseStatus = 'connected';
    updateConnectionIndicator();
  };
  es.addEventListener('state', (e) => {
    try {
      const state = JSON.parse(e.data);
      window._lastState = state;
      document.querySelectorAll('[data-refresh]').forEach(el => el.refresh(state));
    } catch (err) { /* ignore parse errors */ }
  });
  es.onerror = () => {
    _sseStatus = 'reconnecting';
    updateConnectionIndicator();
  };
  return es;
}
connectSSE();

// --- Header Component ---
class ScheduleHeader extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:header;background:var(--surface);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)';
    this.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px">
        <strong style="font-size:18px">Wondering Wizard</strong>
        <span style="color:var(--text-muted);font-size:13px">Schedule Viewer</span>
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)">
          <span id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block"></span>
          <span id="live-label">Disconnected</span>
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span id="clock" style="font-family:monospace;font-size:20px;color:var(--qc-color)">00:00:00</span>
        <button class="secondary" onclick="this.closest('schedule-header').tick(1)">+1 sec</button>
        <button class="secondary" onclick="this.closest('schedule-header').tick(60)">+1 min</button>
        <button class="secondary" onclick="this.closest('schedule-header').tick(300)">+5 min</button>
        <button class="secondary" onclick="this.closest('schedule-header').tick(900)">+15 min</button>
        <span style="border-left:1px solid var(--border);height:24px;margin:0 4px"></span>
        <button id="play-btn" class="secondary" onclick="this.closest('schedule-header').togglePlay()">&#9654; Play</button>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text-muted)">
          <input id="play-speed" type="number" min="0.1" max="120" step="0.1" value="1" style="width:50px;text-align:center;font-size:12px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text)">x
        </label>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text-muted)">
          <input id="play-resolution" type="number" min="1" max="900" step="1" value="1" style="width:50px;text-align:center;font-size:12px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text)">s/tick
        </label>
        <span style="border-left:1px solid var(--border);height:24px;margin:0 4px"></span>
        <button class="secondary" onclick="this.closest('schedule-header').exportLog()" title="Export event log">&#8615; Export</button>
        <button class="secondary" onclick="this.closest('schedule-header').importLog()" title="Import event log">&#8613; Import</button>
        <button class="secondary" onclick="window.open(API+'/editor','_blank')" title="Open export editor">&#9998; Editor</button>
        <button class="secondary" onclick="window.open(API+'/workinstructions','_blank')" title="View work instructions">&#9776; Work Instructions</button>
        <button class="secondary" onclick="window.open(API+'/workqueues','_blank')" title="View work queues">&#9776; Work Queues</button>
        <button class="secondary" onclick="window.open(API+'/pathfinder','_blank')" title="Open pathfinder">&#9737; Pathfinder</button>
        <input id="import-file" type="file" accept=".json" style="display:none">
      </div>`;
    this.setAttribute('data-refresh', '');
  }
  refresh(state) {
    const t = state.currentTime;
    if (t) {
      const d = new Date(t);
      this.querySelector('#clock').textContent = d.toISOString().substring(11, 19);
    }
  }
  async tick(seconds) {
    await apiCall('/api/tick', { seconds });
    refreshState();
  }
  async _playTick() {
    const resolution = parseInt(this.querySelector('#play-resolution').value) || 1;
    await apiCall('/api/tick', { seconds: resolution });
    await refreshState();
  }
  async exportLog() {
    const res = await fetch(API + '/api/event-log/export');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'event-log.json';
    a.click();
    URL.revokeObjectURL(url);
  }
  importLog() {
    const fileInput = this.querySelector('#import-file');
    fileInput.value = '';
    fileInput.onchange = async () => {
      const file = fileInput.files[0];
      if (!file) return;
      const text = await file.text();
      await fetch(API + '/api/event-log/import', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: text
      });
      refreshState();
    };
    fileInput.click();
  }
  togglePlay() {
    if (this._playTimer) {
      clearInterval(this._playTimer);
      this._playTimer = null;
      this.querySelector('#play-btn').innerHTML = '&#9654; Play';
      refreshState(); // full refresh on stop
      return;
    }
    this.querySelector('#play-btn').innerHTML = '&#9724; Stop';
    const speed = () => parseFloat(this.querySelector('#play-speed').value) || 1;
    const resolution = () => parseInt(this.querySelector('#play-resolution').value) || 1;
    const intervalMs = () => Math.round(resolution() * 1000 / speed());
    let pending = false;
    const doTick = async () => {
      if (pending) return;
      pending = true;
      try {
        await this._playTick();
      } finally {
        pending = false;
      }
    };
    doTick();
    this._playTimer = setInterval(doTick, intervalMs());
    const speedInput = this.querySelector('#play-speed');
    const onSpeedChange = () => {
      if (!this._playTimer) return;
      clearInterval(this._playTimer);
      this._playTimer = setInterval(doTick, intervalMs());
    };
    speedInput.addEventListener('input', onSpeedChange);
    this._speedCleanup = () => speedInput.removeEventListener('input', onSpeedChange);
  }
}
customElements.define('schedule-header', ScheduleHeader);

// --- Event Input Panel ---
class EventPanel extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:left';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this._emtDirty = false;
    this._emtOffsetMin = 0;
    this.innerHTML = `
      <h2>Events</h2>

      <h3>Work Instruction</h3>
      <div class="form-group">
        <label>Event Type</label>
        <select id="wi-event-type">
          <option value="CarryCHE Assigned">CarryCHE Assigned</option>
          <option value="CarryCHE Changed">CarryCHE Changed</option>
          <option value="Dispatch Changed">Dispatch Changed</option>
          <option value="Estimated Cycle Time Assigned">Estimated Cycle Time Assigned</option>
          <option value="Estimated Cycle Time Changed">Estimated Cycle Time Changed</option>
          <option value="Estimated Move Time Assigned">Estimated Move Time Assigned</option>
          <option value="Estimated Move Time Changed">Estimated Move Time Changed</option>
          <option value="FetchCHE Assigned">FetchCHE Assigned</option>
          <option value="FetchCHE Changed">FetchCHE Changed</option>
          <option value="Pinning Changed">Pinning Changed</option>
          <option value="PutCHE Assigned">PutCHE Assigned</option>

          <option value="QC Discharged Container">QC Discharged Container</option>

          <option value="WI Abandoned">WI Abandoned</option>
          <option value="WI Bypassed">WI Bypassed</option>
          <option value="WI Created" selected>WI Created</option>
          <option value="WI MoveStage Changed">WI MoveStage Changed</option>
          <option value="WI Resequenced">WI Resequenced</option>
          <option value="WI Reset">WI Reset</option>
          <option value="WI Resumed">WI Resumed</option>
          <option value="WI Reverted">WI Reverted</option>
          <option value="WQ Change">WQ Change</option>
        </select>
      </div>
      <div class="form-group">
        <label>Move Stage</label>
        <select id="wi-move-stage">
          <option value="Planned" selected>Planned</option>
          <option value="Ready">Ready</option>
          <option value="Fetch Underway">Fetch Underway</option>
          <option value="Carry Underway">Carry Underway</option>
          <option value="Carry Complete">Carry Complete</option>
          <option value="Put Underway">Put Underway</option>
          <option value="Put Complete">Put Complete</option>
          <option value="Complete">Complete</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Instruction ID</label>
        <input id="wi-id" type="number" value="1">
      </div>
      <div class="form-group">
        <label>Work Queue ID</label>
        <input id="wi-queue" type="number" value="1">
      </div>
      <div class="form-group">
        <label>Fetch CHE</label>
        <input id="wi-che" value="RTG-01">
      </div>
      <div class="form-group">
        <label>Put CHE</label>
        <input id="wi-put-che" value="">
      </div>
      <div class="form-group" style="display:flex;gap:12px;align-items:center;margin-top:8px">
        <label style="display:flex;align-items:center;gap:4px;margin:0"><input id="wi-twin-fetch" type="checkbox"> Twin Fetch</label>
        <label style="display:flex;align-items:center;gap:4px;margin:0"><input id="wi-twin-put" type="checkbox"> Twin Put</label>
        <label style="display:flex;align-items:center;gap:4px;margin:0"><input id="wi-twin-carry" type="checkbox"> Twin Carry</label>

      <div class="form-group">
        <label>Twin Companion WI</label>

        <label>Est. Cycle Time (sec)</label>
        <input id="wi-ect" type="number" value="120">
      </div>
      <div class="form-group">
        <label>Est. RTG Cycle Time (sec)</label>
        <input id="wi-rtg-ect" type="number" value="60">

          <option value="INACTIVE">INACTIVE</option>

        <input id="wq-muda" type="number" value="5">
      </div>
      <div class="form-group">
        <label>Load Mode</label>
        <select id="wq-load-mode">
          <option value="DSCH">DSCH</option>

    const updateCompanion = () => {
      const anyTwin = this.querySelector('#wi-twin-fetch').checked
          || this.querySelector('#wi-twin-put').checked
          || this.querySelector('#wi-twin-carry').checked;
      const id = parseInt(this.querySelector('#wi-id').value) || 0;
      this.querySelector('#wi-twin-companion').value = anyTwin ? (id % 2 === 1 ? id + 1 : id - 1) : 0;
    };
    this.querySelector('#wi-twin-fetch').addEventListener('change', updateCompanion);
    this.querySelector('#wi-twin-put').addEventListener('change', updateCompanion);
    this.querySelector('#wi-twin-carry').addEventListener('change', updateCompanion);

    });

    if (!this._emtDirty && state.currentTime) {
      const emt = new Date(new Date(state.currentTime).getTime() + (30 + this._emtOffsetMin) * 60 * 1000);
      this.querySelector('#wi-emt').value = emt.toISOString().replace('.000Z', 'Z');
    }

  async sendWI() {
    const data = {
      eventType: this.querySelector('#wi-event-type').value,
      workInstructionId: this.querySelector('#wi-id').value,
      workQueueId: this.querySelector('#wi-queue').value,
      fetchChe: this.querySelector('#wi-che').value,
      putChe: this.querySelector('#wi-put-che').value,
      isTwinFetch: String(this.querySelector('#wi-twin-fetch').checked),
      isTwinPut: String(this.querySelector('#wi-twin-put').checked),
      isTwinCarry: String(this.querySelector('#wi-twin-carry').checked),
      twinCompanionWorkInstruction: this.querySelector('#wi-twin-companion').value,
      toPosition: this.querySelector('#wi-to-position').value,
      containerId: this.querySelector('#wi-container-id').value,
      estimatedMoveTime: this.querySelector('#wi-emt').value,
      estimatedCycleTimeSeconds: this.querySelector('#wi-ect').value,
      estimatedRtgCycleTimeSeconds: this.querySelector('#wi-rtg-ect').value,
      workInstructionMoveStage: this.querySelector('#wi-move-stage').value
    };
    await apiCall('/api/work-instruction', data);
    // Auto-increment WI ID and update twin companion
    const idInput = this.querySelector('#wi-id');
    const newId = parseInt(idInput.value) + 1;
    idInput.value = newId;
    const anyTwin = this.querySelector('#wi-twin-fetch').checked
        || this.querySelector('#wi-twin-put').checked
        || this.querySelector('#wi-twin-carry').checked;
    this.querySelector('#wi-twin-companion').value = anyTwin ? (newId % 2 === 1 ? newId + 1 : newId - 1) : 0;
    this.querySelector('#wi-container-id').value = 'THIVE' + newId;
    this._emtDirty = false;
    this._emtOffsetMin += 2;
    refreshState();
  }
  async sendWQ() {
    await apiCall('/api/work-queue', {
      workQueueId: this.querySelector('#wq-id').value,
      status: this.querySelector('#wq-status').value,
      qcMudaSeconds: this.querySelector('#wq-muda').value,
      loadMode: this.querySelector('#wq-load-mode').value
    });
    refreshState();
  }
}
customElements.define('event-panel', EventPanel);

// --- Schedule View (Center Panel) ---
class ScheduleView extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:center;overflow:auto;position:relative';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this._pxPerSec = 3;
    this.innerHTML = '<h2 style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">Schedule <label style="font-size:11px;font-weight:400;display:flex;align-items:center;gap:6px;color:var(--text-muted)">Scale <input id="scale-slider" type="range" min="3" max="15" value="3" style="width:80px"> <span id="scale-val">3</span>px/s</label><span id="schedule-pager" style="font-size:12px;font-weight:400;display:flex;align-items:center;gap:6px;margin-left:auto"></span></h2><div id="schedule-content"><p style="color:var(--text-muted)">No schedules yet. Add work instructions and activate a work queue.</p></div>';
    this.querySelector('#scale-slider').addEventListener('input', e => {
      this._pxPerSec = parseInt(e.target.value);
      this.querySelector('#scale-val').textContent = this._pxPerSec;
      this.refresh(window._lastState || {});
    });
    // Delegated click handler for complete buttons — survives DOM rebuilds during playback
    this.addEventListener('click', async (e) => {
      const btn = e.target.closest('.complete-btn');
      if (!btn) return;
      e.stopPropagation();
      await apiCall('/api/action-completed', {
        actionId: btn.dataset.actionId,
        workQueueId: btn.dataset.wq
      });
      const popup = btn.closest('.action-popup');
      if (popup) popup.remove();
      refreshState();
    });
  }
  refresh(state) {
    const container = this.querySelector('#schedule-content');
    const schedules = state.schedules || [];
    const totalSchedules = state.totalSchedules || schedules.length;
    const page = state.schedulePage || 0;
    const pageSize = state.schedulePageSize || 5;
    const totalPages = Math.max(1, Math.ceil(totalSchedules / pageSize));

    // Render pager
    const pager = this.querySelector('#schedule-pager');
    if (totalSchedules > pageSize) {
      pager.innerHTML = '<button class="secondary" id="sched-prev" style="padding:2px 8px;font-size:11px"' + (page <= 0 ? ' disabled' : '') + '>&lt;</button>'
        + '<span style="color:var(--text-muted)">' + (page + 1) + ' / ' + totalPages + ' (' + totalSchedules + ' WQs)</span>'
        + '<button class="secondary" id="sched-next" style="padding:2px 8px;font-size:11px"' + (page >= totalPages - 1 ? ' disabled' : '') + '>&gt;</button>';
      pager.querySelector('#sched-prev').onclick = () => { window._schedulePage = Math.max(0, page - 1); refreshState(); };
      pager.querySelector('#sched-next').onclick = () => { window._schedulePage = Math.min(totalPages - 1, page + 1); refreshState(); };
    } else if (totalSchedules > 0) {
      pager.innerHTML = '<span style="color:var(--text-muted)">' + totalSchedules + ' WQ' + (totalSchedules > 1 ? 's' : '') + '</span>';
    } else {
      pager.innerHTML = '';
    }

    if (schedules.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted)">No schedules yet. Add work instructions and activate a work queue.</p>';
      return;
    }

    const deviceColors = { RTG: 'var(--rtg-color)', TT: 'var(--tt-color)', QC: 'var(--qc-color)' };
    const scale = this._pxPerSec || 3;

    let html = '';
    for (const schedule of schedules) {
      html += '<div style="margin-bottom:20px">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
      html += '<strong>' + schedule.workQueueId + '</strong>';
      if (schedule.estimatedMoveTime) {
        html += '<span style="font-size:12px;color:var(--text-muted)">EMT: ' + schedule.estimatedMoveTime + '</span>';
      }
      const totalDelay = schedule.totalDelaySeconds || 0;
      if (totalDelay > 0) {
        html += '<span style="font-size:12px;font-weight:600;color:#ef4444;background:rgba(239,68,68,0.15);padding:2px 8px;border-radius:4px">DELAY: +' + totalDelay + 's</span>';
      } else {
        html += '<span style="font-size:12px;font-weight:600;color:var(--completed);background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:4px">ON TIME</span>';
      }
      html += '</div>';

      const takts = schedule.takts || [];
      if (takts.length === 0) { html += '</div>'; continue; }

      // 7 double-rows: each has RTG sub-row on top, TT sub-row on bottom
      // Containers assigned round-robin: container 0→slot 0, ..., container 6→slot 6, container 7→slot 0, ...
      const LANE_COUNT = 7;

      // Collect all container indices and assign round-robin slots
      const containerIndices = new Set();
      for (const takt of takts) {
        for (const action of takt.actions || []) {
          if (action.deviceType === 'RTG' || action.deviceType === 'TT') {
            containerIndices.add(action.containerIndex != null ? action.containerIndex : 0);
          }
        }
      }
      const sortedContainers = [...containerIndices].sort((a, b) => a - b);
      const containerSlot = {};
      sortedContainers.forEach((ci, i) => { containerSlot[ci] = i % LANE_COUNT; });
      const actualLanes = Math.min(LANE_COUNT, sortedContainers.length);

      // Grid: label column + one column per takt
      const colDefs = takts.map(t => { const d = t.durationSeconds || 120; return 'minmax(' + Math.round(d * scale) + 'px,' + d + 'fr)'; }).join(' ');
      html += '<div style="display:inline-grid;grid-template-columns:56px ' + colDefs + ';gap:1px;min-width:100%">';

      // Header row: corner + takt headers
      html += '<div style="background:var(--surface2);padding:4px;position:sticky;left:0;z-index:2"></div>';
      for (const takt of takts) {
        const ts = takt.status || 'WAITING';
        const tc = ts === 'ACTIVE' ? 'var(--active)' : ts === 'COMPLETED' ? 'var(--completed)' : 'var(--pending)';
        html += '<div style="background:var(--surface2);padding:4px 6px;text-align:center;border-bottom:2px solid ' + tc + '">';
        html += '<div style="font-size:11px;color:var(--text-muted)">' + takt.name;
        const conditions = takt.conditions || [];
        const unsatisfied = conditions.filter(c => !c.satisfied);
        if (ts === 'WAITING' && conditions.length > 0) {
          const condColor = unsatisfied.length > 0 ? '#ef4444' : 'var(--completed)';
          html += ' <span class="conditions-btn" data-takt="' + takt.name + '" data-wq="' + schedule.workQueueId + '" data-conditions="' + encodeURIComponent(JSON.stringify(conditions)) + '" style="cursor:pointer;font-size:12px;vertical-align:middle;color:' + condColor + '" title="' + unsatisfied.length + ' condition(s) blocking">&#9881;</span>';
        }
        html += '</div>';
        html += '<div style="font-size:9px;font-weight:600;color:' + tc + '">' + ts + '</div>';
        const fmtTime = t => t ? new Date(t).toISOString().substring(11, 19) : '--:--:--';
        html += '<div style="font-size:9px;color:var(--text-muted);margin-top:2px;line-height:1.4">';
        html += 'P: ' + fmtTime(takt.plannedStartTime) + '<br>';
        html += 'E: ' + fmtTime(takt.estimatedStartTime) + '<br>';
        html += '<span style="color:' + (takt.actualStartTime ? 'var(--completed)' : 'var(--text-muted)') + '">A: ' + fmtTime(takt.actualStartTime) + '</span>';
        html += '</div>';
        if (takt.actualStartTime) {
          const startDel = takt.startDelaySeconds || 0;
          const taktDel = takt.taktDelaySeconds || 0;
          html += '<div style="font-size:9px;margin-top:3px;line-height:1.3">';
          html += '<span style="color:' + (startDel > 0 ? '#ef4444' : 'var(--completed)') + '">start: ' + (startDel > 0 ? '+' + startDel + 's' : '0s') + '</span><br>';
          if (ts === 'COMPLETED') {
            html += '<span style="color:' + (taktDel > 0 ? '#ef4444' : 'var(--completed)') + '">exec: ' + (taktDel > 0 ? '+' + taktDel + 's' : '0s') + '</span>';
          } else if (ts === 'ACTIVE') {
            html += '<span style="color:var(--text-muted)">exec: ...</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      }

      // QC row (unchanged — single row)
      html += '<div style="background:var(--surface2);padding:4px;display:flex;align-items:center;justify-content:center;position:sticky;left:0;z-index:1">';
      html += '<span style="background:' + deviceColors.QC + ';color:white;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600">QC</span>';
      html += '</div>';
      for (const takt of takts) {
        const cellActions = (takt.actions || []).filter(a => a.deviceType === 'QC');
        html += '<div style="background:var(--bg);padding:0;display:flex;flex-direction:row;gap:0;min-height:28px;align-items:stretch">';
        for (const action of cellActions) {
          html += this._renderAction(action, schedule.workQueueId, scale);
        }
        html += '</div>';
      }

      // Detect distinct RTG deviceIndex values to determine if we need split RTG rows
      const rtgDeviceIndices = new Set();
      for (const takt of takts) {
        for (const action of takt.actions || []) {
          if (action.deviceType === 'RTG') {
            rtgDeviceIndices.add(action.deviceIndex != null ? action.deviceIndex : 0);
          }
        }
      }
      const hasMultipleRtgDevices = rtgDeviceIndices.size > 1;
      const sortedRtgDeviceIndices = [...rtgDeviceIndices].sort((a, b) => a - b);
      const rtgDeviceA = sortedRtgDeviceIndices[0] ?? 0;
      const rtgDeviceB = sortedRtgDeviceIndices[1] ?? -1;

      const SRH = 60; // sub-row height
      const rtgSubRows = hasMultipleRtgDevices ? 2 : 1;
      const subRowCount = rtgSubRows + 1; // +1 for TT
      const laneHeight = SRH * subRowCount + (subRowCount - 1); // height + borders

      for (let lane = 0; lane < actualLanes; lane++) {
        const laneSlot = lane;
        const matchLane = a => containerSlot[a.containerIndex != null ? a.containerIndex : 0] === laneSlot;

        // Label spanning all sub-rows
        html += '<div style="background:var(--surface2);padding:2px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:sticky;left:0;z-index:1;gap:1px;height:' + laneHeight + 'px">';
        if (hasMultipleRtgDevices) {
          html += '<span style="background:' + deviceColors.RTG + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">RTG A</span>';
          html += '<span style="background:' + deviceColors.RTG + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">RTG B</span>';
        } else {
          html += '<span style="background:' + deviceColors.RTG + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">RTG</span>';
        }
        html += '<span style="background:' + deviceColors.TT + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">TT</span>';
        html += '</div>';

        for (const takt of takts) {
          const laneActions = (takt.actions || []).filter(matchLane);
          const ttActions = laneActions.filter(a => a.deviceType === 'TT');

          html += '<div style="background:var(--bg);display:flex;flex-direction:column;gap:0;height:' + laneHeight + 'px">';

          if (hasMultipleRtgDevices) {
            // Split RTG actions by deviceIndex — first distinct index → row A, rest → row B
            const allRtg = laneActions.filter(a => a.deviceType === 'RTG');
            const cellRtgIndices = [...new Set(allRtg.map(a => a.deviceIndex != null ? a.deviceIndex : 0))].sort((a, b) => a - b);
            const cellFirstIdx = cellRtgIndices[0];
            const rtgA = allRtg.filter(a => (a.deviceIndex != null ? a.deviceIndex : 0) === cellFirstIdx);
            const rtgB = allRtg.filter(a => (a.deviceIndex != null ? a.deviceIndex : 0) !== cellFirstIdx);
            // RTG-A sub-row
            html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch;border-bottom:1px solid var(--surface2)">';
            for (const action of rtgA) html += this._renderAction(action, schedule.workQueueId, scale);
            html += '</div>';
            // RTG-B sub-row
            html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch;border-bottom:1px solid var(--surface2)">';
            for (const action of rtgB) html += this._renderAction(action, schedule.workQueueId, scale);
            html += '</div>';
          } else {
            // Single RTG sub-row
            const rtgActions = laneActions.filter(a => a.deviceType === 'RTG');
            html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch;border-bottom:1px solid var(--surface2)">';
            for (const action of rtgActions) html += this._renderAction(action, schedule.workQueueId, scale);
            html += '</div>';
          }

          // TT sub-row
          html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch">';
          for (const action of ttActions) html += this._renderAction(action, schedule.workQueueId, scale);
          html += '</div>';
          html += '</div>';
        }
      }

      html += '</div></div>';
    }
    container.innerHTML = html;

    // Bind click popups for narrow actions
    const self = this;
    container.querySelectorAll('[data-popup-html]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        // Toggle: remove if already open for this element
        const existingId = el.dataset.popupId;
        if (existingId) {
          const ep = document.getElementById(existingId);
          if (ep) ep.remove();
          delete el.dataset.popupId;
          return;
        }
        // Remove any other open popups
        self.querySelectorAll('.action-popup').forEach(p => p.remove());
        const popup = document.createElement('div');
        popup.className = 'action-popup';
        const uid = 'popup-' + Math.random().toString(36).slice(2, 9);
        popup.id = uid;
        el.dataset.popupId = uid;
        const rect = el.getBoundingClientRect();
        const parentRect = self.getBoundingClientRect();
        popup.style.cssText = 'position:absolute;z-index:100;background:' + el.dataset.popupBg + ';border:1px solid ' + el.dataset.popupBorder + ';border-top:3px solid ' + el.dataset.popupContainer + ';border-radius:4px;padding:3px 5px;font-size:11px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);left:' + (rect.left - parentRect.left + self.scrollLeft) + 'px;top:' + (rect.bottom - parentRect.top + self.scrollTop + 2) + 'px';
        popup.innerHTML = '<div style="display:flex;justify-content:flex-end"><span style="cursor:pointer;font-size:13px;line-height:1;color:var(--text-muted)" onclick="this.closest(\'.action-popup\').remove()">&#10005;</span></div>' + el.dataset.popupHtml;
        self.appendChild(popup);
      });
    });

    // Bind action conditions buttons
    container.querySelectorAll('.action-conditions-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        self.querySelectorAll('.conditions-popup').forEach(p => p.remove());

        const conditions = JSON.parse(decodeURIComponent(btn.dataset.conditions));
        const actionDesc = btn.dataset.actionDesc;
        const actionId = btn.dataset.actionId;
        const wqId = btn.dataset.wq;

        const popup = document.createElement('div');
        popup.className = 'conditions-popup';
        const rect = btn.getBoundingClientRect();
        const parentRect = self.getBoundingClientRect();
        popup.style.cssText = 'position:absolute;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4);min-width:260px;max-width:400px;left:' + (rect.left - parentRect.left + self.scrollLeft) + 'px;top:' + (rect.bottom - parentRect.top + self.scrollTop + 4) + 'px';

        let popupHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        popupHtml += '<strong style="font-size:13px">Conditions for "' + actionDesc + '"</strong>';
        popupHtml += '<span style="cursor:pointer;font-size:15px;line-height:1;color:var(--text-muted);padding:0 2px" onclick="this.closest(\'.conditions-popup\').remove()">&#10005;</span>';
        popupHtml += '</div>';

        for (const cond of conditions) {
          const icon = cond.satisfied ? '<span style="color:var(--completed)">&#10003;</span>'
                     : cond.overridden ? '<span style="color:var(--tt-color)">&#8623;</span>'
                     : '<span style="color:#ef4444">&#10007;</span>';
          const label = cond.type === 'TAKT_ACTIVATION' ? 'Takt Activation' : 'Action Dependencies';

          popupHtml += '<div style="padding:6px 0;border-top:1px solid var(--border)">';
          popupHtml += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">';
          popupHtml += '<span>' + icon + ' <strong>' + label + '</strong></span>';
          if (!cond.satisfied && !cond.overridden) {
            popupHtml += '<button class="action-override-btn" data-wq="' + wqId + '" data-action-id="' + actionId + '" data-cond-id="' + cond.id + '" style="background:#f59e0b;color:white;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600">Override</button>';
          }
          popupHtml += '</div>';
          if (cond.explanation) {
            popupHtml += '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;word-break:break-word">' + cond.explanation + '</div>';
          }
          if (cond.overridden) {
            popupHtml += '<div style="font-size:10px;color:var(--tt-color);margin-top:2px">Overridden</div>';
          }
          popupHtml += '</div>';
        }

        popup.innerHTML = popupHtml;
        self.appendChild(popup);

        // Bind action override buttons
        popup.querySelectorAll('.action-override-btn').forEach(obtn => {
          obtn.addEventListener('click', async (ev) => {
            ev.stopPropagation();
            await apiCall('/api/override-action-condition', {
              workQueueId: obtn.dataset.wq,
              actionId: obtn.dataset.actionId,
              conditionId: obtn.dataset.condId
            });
            popup.remove();
            refreshState();
          });
        });
      });
    });

    // Bind conditions buttons
    container.querySelectorAll('.conditions-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        // Remove any existing conditions popup
        self.querySelectorAll('.conditions-popup').forEach(p => p.remove());

        const conditions = JSON.parse(decodeURIComponent(btn.dataset.conditions));
        const taktName = btn.dataset.takt;
        const wqId = btn.dataset.wq;

        const popup = document.createElement('div');
        popup.className = 'conditions-popup';
        const rect = btn.getBoundingClientRect();
        const parentRect = self.getBoundingClientRect();
        popup.style.cssText = 'position:absolute;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4);min-width:260px;max-width:400px;left:' + (rect.left - parentRect.left + self.scrollLeft) + 'px;top:' + (rect.bottom - parentRect.top + self.scrollTop + 4) + 'px';

        let popupHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        popupHtml += '<strong style="font-size:13px">Conditions for ' + taktName + '</strong>';
        popupHtml += '<span style="cursor:pointer;font-size:15px;line-height:1;color:var(--text-muted);padding:0 2px" onclick="this.closest(\'.conditions-popup\').remove()">&#10005;</span>';
        popupHtml += '</div>';

        for (const cond of conditions) {
          const icon = cond.satisfied ? '<span style="color:var(--completed)">&#10003;</span>'
                     : cond.overridden ? '<span style="color:var(--tt-color)">&#8623;</span>'
                     : '<span style="color:#ef4444">&#10007;</span>';
          const label = cond.type === 'TIME' ? 'Start Time' : 'Dependencies';

          popupHtml += '<div style="padding:6px 0;border-top:1px solid var(--border)">';
          popupHtml += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">';
          popupHtml += '<span>' + icon + ' <strong>' + label + '</strong></span>';
          if (!cond.satisfied && !cond.overridden) {
            popupHtml += '<button class="override-btn" data-wq="' + wqId + '" data-takt="' + taktName + '" data-cond-id="' + cond.id + '" style="background:#f59e0b;color:white;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600">Override</button>';
          }
          popupHtml += '</div>';
          if (cond.explanation) {
            popupHtml += '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;word-break:break-word">' + cond.explanation + '</div>';
          }
          if (cond.overridden) {
            popupHtml += '<div style="font-size:10px;color:var(--tt-color);margin-top:2px">Overridden</div>';
          }
          popupHtml += '</div>';
        }

        popup.innerHTML = popupHtml;
        self.appendChild(popup);

        // Bind override buttons
        popup.querySelectorAll('.override-btn').forEach(obtn => {
          obtn.addEventListener('click', async (ev) => {
            ev.stopPropagation();
            await apiCall('/api/override-condition', {
              workQueueId: obtn.dataset.wq,
              taktName: obtn.dataset.takt,
              conditionId: obtn.dataset.condId
            });
            popup.remove();
            refreshState();
          });
        });
      });
    });
  }
  _renderAction(action, wqId, scale) {
    const ci = action.containerIndex != null ? action.containerIndex : 0;
    const containerHue = (ci * 137) % 360;
    const containerColor = 'hsl(' + containerHue + ',70%,60%)';

    let bgColor, borderColor, textOpacity, statusLabel;
    if (action.status === 'COMPLETED') {
      bgColor = 'rgba(34,197,94,0.15)'; borderColor = 'var(--completed)'; textOpacity = '0.7';
      statusLabel = '<span style="color:var(--completed)">&#10003;</span>';
    } else if (action.status === 'ACTIVE') {
      bgColor = 'rgba(59,130,246,0.18)'; borderColor = 'var(--active)'; textOpacity = '1';
      statusLabel = '<span style="color:var(--active)">&#9654;</span>';
    } else {
      bgColor = 'rgba(100,116,139,0.10)'; borderColor = 'var(--border)'; textOpacity = '0.5';
      statusLabel = '<span style="color:var(--pending)">&#9679;</span>';
    }

    const dur = action.durationSeconds || 30;
    const widthPx = Math.round(dur * scale);
    const narrow = widthPx < 30;

    const actionConditions = action.conditions || [];
    const actionUnsatisfied = actionConditions.filter(c => !c.satisfied);
    let conditionsIcon = '';
    if (action.status === 'PENDING' && actionConditions.length > 0) {
      const acondColor = actionUnsatisfied.length > 0 ? '#ef4444' : 'var(--completed)';
      conditionsIcon = ' <span class="action-conditions-btn" data-action-id="' + action.id + '" data-action-desc="' + action.description.replace(/"/g, '&quot;') + '" data-wq="' + wqId + '" data-conditions="' + encodeURIComponent(JSON.stringify(actionConditions)) + '" style="cursor:pointer;font-size:10px;color:' + acondColor + '" title="' + actionUnsatisfied.length + ' condition(s) blocking">&#9881;</span>';
    }

    const containerLabel = (action.containerIds && action.containerIds.length > 0) ? action.containerIds.join(', ') : 'C' + ci;
    let innerHtml = '<div style="display:flex;align-items:center;gap:3px;font-size:9px;font-weight:600;min-width:0">' + statusLabel + ' <span title="' + containerLabel + '" style="color:' + containerColor + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + containerLabel + '</span>' + conditionsIcon + '</div><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + action.description + '</div>';
    if (action.status === 'ACTIVE') {
      innerHtml += '<button class="complete-btn" style="margin-top:2px" data-action-id="' + action.id + '" data-wq="' + wqId + '">Complete</button>';
    }

    let h = '<div style="position:relative;background:' + bgColor + ';border:1px solid ' + borderColor + ';border-top:3px solid ' + containerColor + ';border-radius:4px;padding:' + (narrow ? '1px 2px' : '3px 5px') + ';opacity:' + textOpacity + ';font-size:11px;min-width:' + widthPx + 'px;width:' + widthPx + 'px;box-sizing:border-box;flex-shrink:0;overflow:hidden;cursor:' + (narrow ? 'pointer' : 'default') + '"' + (narrow ? ' data-popup-html="' + innerHtml.replace(/"/g, '&quot;') + '" data-popup-bg="' + bgColor + '" data-popup-border="' + borderColor + '" data-popup-container="' + containerColor + '"' : '') + '>';
    if (!narrow) {
      h += innerHtml;
    }
    h += '</div>';
    return h;
  }
}
customElements.define('schedule-view', ScheduleView);

// --- Timeline Panel ---
class TimelinePanel extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:right';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this.innerHTML = '<h2 style="display:flex;align-items:center;gap:12px">Timeline <button id="snapshot-btn" class="secondary" style="font-size:11px;padding:3px 8px">Snapshot</button> <label style="font-size:12px;font-weight:400;display:flex;align-items:center;gap:4px;color:var(--text-muted)"><input id="hide-ticks" type="checkbox" checked> Hide time events</label></h2><div id="timeline-content"></div>';
    this.querySelector('#snapshot-btn').addEventListener('click', async () => {
      await apiCall('/api/snapshot');
      refreshState();
    });
    this.querySelector('#hide-ticks').addEventListener('change', () => { if (window._lastState) this.refresh(window._lastState); });
  }
  refresh(state) {
    const container = this.querySelector('#timeline-content');
    const steps = state.steps || [];
    const totalSteps = state.totalSteps || steps.length;
    if (steps.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No events yet.</p>';
      return;
    }

    const hideTicks = this.querySelector('#hide-ticks').checked;
    const snapshotStep = state.snapshotStep ?? -1;

    let html = '';
    if (totalSteps > steps.length) {
      html += '<div style="color:var(--text-muted);font-size:11px;padding:4px 0;margin-bottom:4px;border-bottom:1px solid var(--border)">Showing last ' + steps.length + ' of ' + totalSteps + ' events</div>';
    }
    for (let i = steps.length - 1; i >= 0; i--) {
      const step = steps[i];
      if (hideTicks && step.description && (step.description.startsWith('Tick ') || step.description === 'System time set')) continue;
      const effectCount = (step.sideEffects || []).length;
      const canRevert = step.stepNumber > snapshotStep && snapshotStep >= 0;
      const isSnapshot = step.stepNumber === snapshotStep;
      html += '<div class="timeline-entry" data-step="' + step.stepNumber + '" ';
      html += 'style="padding:8px 10px;margin-bottom:4px;border-radius:4px;'
           + (canRevert ? 'cursor:pointer;' : 'cursor:default;opacity:0.6;')
           + 'border:1px solid ' + (isSnapshot ? 'var(--active)' : 'var(--border)') + ';font-size:13px;transition:background .15s"';
      if (canRevert) html += ' onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'transparent\'"';
      html += '>';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<span>';
      if (isSnapshot) html += '<span style="color:var(--active);font-size:10px;margin-right:4px">SNAPSHOT</span>';
      html += '<strong style="color:var(--text-muted)">#' + step.stepNumber + '</strong> ' + step.description + '</span>';
      if (effectCount > 0) {
        html += '<span style="background:var(--active);color:white;font-size:10px;padding:1px 6px;border-radius:10px">' + effectCount + '</span>';
      }
      html += '</div></div>';
    }
    container.innerHTML = html;

    container.querySelectorAll('.timeline-entry').forEach(entry => {
      const stepNum = parseInt(entry.dataset.step);
      if (stepNum <= snapshotStep) return;
      entry.addEventListener('click', async () => {
        const targetStep = stepNum - 1;
        await apiCall('/api/step-back-to', { targetStep: String(targetStep) });
        refreshState();
      });
    });
  }
}
customElements.define('timeline-panel', TimelinePanel);

// --- Side Effects Log ---
class SideEffectsLog extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:bottom;max-height:160px';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this.innerHTML = '<h2>Side Effects</h2><div id="effects-content" style="font-family:monospace;font-size:12px;overflow-y:auto;max-height:110px"></div>';
  }
  refresh(state) {
    const container = this.querySelector('#effects-content');
    const steps = state.steps || [];
    let html = '';
    for (const step of steps) {
      for (const effect of step.sideEffects || []) {
        const typeColor = effect.type === 'ActionActivated' ? 'var(--active)' :
                          effect.type === 'ActionCompleted' ? 'var(--completed)' :
                          effect.type === 'TaktActivated' ? '#8b5cf6' :
                          effect.type === 'TaktCompleted' ? '#a78bfa' :
                          effect.type === 'ScheduleCreated' ? 'var(--qc-color)' :
                          effect.type === 'ScheduleAborted' ? '#ef4444' : 'var(--text-muted)';
        html += '<div style="padding:2px 0;border-bottom:1px solid var(--bg)">';
        html += '<span style="color:var(--text-muted)">#' + step.stepNumber + '</span> ';
        html += '<span style="color:' + typeColor + '">' + effect.type + '</span>';

        if (effect.workQueueId) html += ' <span style="color:var(--text-muted)">' + effect.workQueueId + '</span>';
        if (effect.taktName) html += ' ' + effect.taktName;
        if (effect.actionDescription) html += ' "' + effect.actionDescription + '"';
        html += '</div>';
      }
    }
    container.innerHTML = html || '<span style="color:var(--text-muted)">No side effects yet.</span>';
    container.scrollTop = container.scrollHeight;
  }
}
customElements.define('side-effects-log', SideEffectsLog);

// Initial state load
refreshState();
</script>
</body>
</html>
