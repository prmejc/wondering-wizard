# =============================================================================
# Wondering Wizard Settings
# =============================================================================

# --- Server ---
server.port=8080

# --- Kafka Consumer ---
# Set to true to enable Kafka consumers
kafka.enabled=true

# Kafka broker connection
kafka.bootstrap-server=kafka-broker-service:9093
kafka.client-id=fes
kafka.schema-registry-url=http://kafka-schema-registry-service:8081

# SASL authentication (leave blank to disable)
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# WorkQueue consumer
kafka.consumer.work-queue.topic=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1
kafka.consumer.work-queue.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-queue.consumergroup.v1
kafka.consumer.work-queue.avro-message-type=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1.WorkQueue
kafka.consumer.work-queue.read-all-at-startup=true

# WorkInstruction consumer
kafka.consumer.work-instruction.topic=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1
kafka.consumer.work-instruction.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-instruction.consumergroup.v1
kafka.consumer.work-instruction.avro-message-type=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1.WorkInstruction
kafka.consumer.work-instruction.read-all-at-startup=true

# Terminal code for outgoing messages
kafka.terminal-code=ECTDELTA

# AssetEvent consumers (JSON)
kafka.consumer.asset-event-rtg.topic=apmt.terminaloperations.assetevent.rubbertyredgantry.topic.confidential.dedicated.v1
kafka.consumer.asset-event-rtg.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-rtg.consumergroup.v1

kafka.consumer.asset-event-qc.topic=apmt.terminaloperations.assetevent.quaycrane.topic.confidential.dedicated.v1
kafka.consumer.asset-event-qc.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-qc.consumergroup.v1

kafka.consumer.asset-event-eh.topic=apmt.terminaloperations.assetevent.emptyhandler.topic.confidential.dedicated.v1
kafka.consumer.asset-event-eh.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-asset-event-eh.consumergroup.v1

# Equipment instruction producer (RTG)
kafka.producer.equipment-instruction-rtg.topic=apmt.terminaloperations.equipmentinstruction.rubbertyredgantry.topic.confidential.dedicated.v1

# Equipment instruction producer (TT)
kafka.producer.equipment-instruction-tt.topic=apmt.terminaloperations.equipmentinstruction.terminaltruck.topic.confidential.dedicated.v1

# Equipment instruction producer (QC)
kafka.producer.equipment-instruction-qc.topic=apmt.terminaloperations.equipmentinstruction.quaycrane.topic.confidential.dedicated.v1
