# =============================================================================
# Wondering Wizard Settings
# =============================================================================

# --- Server ---
server.port=8080

# --- Kafka Consumer ---
# Set to true to enable Kafka consumers
kafka.enabled=true

# Kafka broker connection
kafka.bootstrap-server=kafka-broker-service:9093
kafka.client-id=fes
kafka.schema-registry-url=http://kafka-schema-registry-service:8081

# SASL authentication (leave blank to disable)
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# WorkQueue consumer
kafka.consumer.work-queue.topic=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1
kafka.consumer.work-queue.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-queue.consumergroup.v1
kafka.consumer.work-queue.avro-message-type=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1.WorkQueue
kafka.consumer.work-queue.read-all-at-startup=true

# WorkInstruction consumer
kafka.consumer.work-instruction.topic=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1
kafka.consumer.work-instruction.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-instruction.consumergroup.v1
kafka.consumer.work-instruction.avro-message-type=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1.WorkInstruction
kafka.consumer.work-instruction.read-all-at-startup=true

# ContainerHandlingEquipment consumer
kafka.consumer.container-handling-equipment.topic=APMT.terminalOperations.containerHandlingEquipment.topic.confidential.dedicated.v1
kafka.consumer.container-handling-equipment.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-che.consumergroup.v1

# CheLogicalPosition consumer
kafka.consumer.che-logical-position.topic=apmt.terminaloperations.chelogicalposition.topic.confidential.dedicated.v1
kafka.consumer.che-logical-position.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-che-pos.consumergroup.v1

# TerminalLayout (digital map) consumer
kafka.consumer.terminal-layout.topic=apmt.terminaloperations.digitalmap.topic.confidential.dedicated.v1
kafka.consumer.terminal-layout.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-digitalmap.consumergroup.v1
kafka.consumer.terminal-layout.read-all-at-startup=true

# QuayCraneMapping consumer
kafka.consumer.quay-crane-mapping.topic=apmt.quaysideoperations.quaycraneflowposition.topic.internal.any.v2
kafka.consumer.quay-crane-mapping.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-qc-mapping.consumergroup.v1
kafka.consumer.quay-crane-mapping.read-all-at-startup=true

# ContainerMoveState consumer
kafka.consumer.container-move-state.topic=apmt.terminaloperations.containermovestate.topic.confidential.status.v1
kafka.consumer.container-move-state.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-cms.consumergroup.v1

# CraneDelayActivities consumer
kafka.consumer.crane-delay-activities.topic=APMT.terminalOperations.craneDelayActivities.topic.confidential.dedicated.v1
kafka.consumer.crane-delay-activities.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-crane-delay.consumergroup.v1

# CraneAvailabilityStatus consumer
kafka.consumer.crane-availability-status.topic=apmt.terminaloperations.craneavailabilitystatus.topic.confidential.dedicated.v1
kafka.consumer.crane-availability-status.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-crane-availability.consumergroup.v1

# CraneReadiness consumer
kafka.consumer.crane-readiness.topic=apmt.terminal-operations.cranereadiness.topic.internal.any.v1
