# =============================================================================
# Wondering Wizard Settings
# =============================================================================

# --- Server ---
server.port=8080

# --- Kafka Consumer ---
# Set to true to enable Kafka consumers
kafka.enabled=true

# Kafka broker connection
kafka.bootstrap-server=kafka-broker-service:9093
kafka.client-id=fes
kafka.schema-registry-url=http://kafka-schema-registry-service:8081

# SASL authentication (leave blank to disable)
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# WorkQueue consumer
kafka.consumer.work-queue.topic=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1
kafka.consumer.work-queue.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-queue.consumergroup.v1
kafka.consumer.work-queue.avro-message-type=APMT.terminalOperations.workQueue.topic.confidential.dedicated.v1.WorkQueue
kafka.consumer.work-queue.read-all-at-startup=true

# WorkInstruction consumer
kafka.consumer.work-instruction.topic=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1
kafka.consumer.work-instruction.group-id=apmt.tc1.sit.terminal-operations.wondering-wizard-work-instruction.consumergroup.v1
kafka.consumer.work-instruction.avro-message-type=APMT.terminalOperations.workInstruction.topic.confidential.dedicated.v1.WorkInstruction
kafka.consumer.work-instruction.read-all-at-startup=true
