<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FES - System Status</title>
<style>
  :root {
    --rtg-color: #2563eb;
    --tt-color: #c2410c;
    --qc-color: #7c3aed;
    --bg: #e2e8f0;
    --surface: #f8fafc;
    --surface2: #f1f5f9;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #cbd5e1;
    --pending: #94a3b8;
    --active: #ea580c;
    --completed: #059669;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: auto 1fr 300px;
    grid-template-areas:
      "header header header"
      "left center right"
      "bottom bottom bottom";
    gap: 1px;
  }
  .panel { background: var(--surface); padding: 16px; overflow-y: auto; }
  h2 { font-size: 14px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px; }
  h3 { font-size: 13px; color: var(--text-muted); margin: 12px 0 6px; }
  button {
    background: var(--active); color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button:active { opacity: 0.8; }
  button.secondary { background: var(--surface2); color: var(--text); }
  button.complete-btn { background: var(--completed); font-size: 11px; padding: 3px 8px; }
  input, select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-size: 13px; width: 100%;
  }
  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; margin-top: 8px; }
  .form-group { margin-bottom: 6px; }

  /* Collapsible sidebar */
  .sidebar { grid-area: left; background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; transition: width 0.2s ease; width: 220px; }
  .sidebar.collapsed { width: 44px; }
  .sidebar.collapsed .sidebar-content { display: none; }
  .sidebar.collapsed .sidebar-toggle span { display: none; }
  .sidebar-toggle {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    cursor: pointer; border: none; background: var(--surface2); color: var(--text);
    font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border);
    width: 100%; text-align: left;
  }
  .sidebar-toggle:hover { background: var(--bg); }
  .sidebar-content { padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .sidebar-content button {
    width: 100%; text-align: left; padding: 8px 12px; font-size: 12px;
    background: var(--surface2); color: var(--text); border-radius: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-content button:hover { background: var(--bg); }
  .sidebar-content .section-label {
    font-size: 10px; text-transform: uppercase; color: var(--text-muted);
    letter-spacing: 1px; padding: 8px 4px 4px; font-weight: 600;
  }
  .sidebar-content .nav-badge {
    margin-left: auto; background: var(--completed); color: white;
    font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600;
  }
  .sidebar-content .nav-badge-orange { background: var(--active); }
  .sidebar-content .nav-badge-red { background: #ef4444; }
</style>
</head>
<body>

<schedule-header></schedule-header>
<nav-sidebar></nav-sidebar>
<schedule-view></schedule-view>
<timeline-panel></timeline-panel>
<side-effects-log></side-effects-log>

<script>
const API = window.location.pathname.replace(/\/$/, '');

async function apiCall(path, body) {
  const opts = body ? { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) } : {};
  const res = await fetch(API + path, opts);
  return res.json();
}

window._schedulePage = 0;
window._schedulePageSize = 5;

// --- Sound System (F-21) ---
const _sound = (() => {
  let ctx = null;
  const pageOpenTime = Date.now();
  const MUTE_MS = 5000;

  const G_MAJOR = {
    1: [196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 369.99],
    2: [392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 739.99],
    3: [783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1479.98],
    4: [1567.98, 1760.00, 1975.53, 2093.00, 2349.32, 2637.02, 2959.96],
    5: [3135.96, 3520.00, 3951.07, 4186.01, 4698.63, 5274.04, 5919.91]
  };

  const G_MINOR_INTERVALS = {
    1: { g: 196.00, terca: 233.08, quarta: 261.63, kvinta: 293.66, sexta: 311.13, septima: 349.23 },
    2: { g: 392.00, terca: 466.16, quarta: 523.25, kvinta: 587.33, sexta: 622.25, septima: 698.46 }
  };

  function getCtx() {
    if (!ctx) ctx = new AudioContext();
    return ctx;
  }

  function isMuted() {
    return Date.now() - pageOpenTime < MUTE_MS;
  }

  function playTone(freq, duration, startTime) {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.12, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  function playChord(freqs, duration, startTime) {
    const ac = getCtx();
    const t = startTime != null ? startTime : ac.currentTime;
    for (const f of freqs) {
      playTone(f, duration, t);
    }
  }

  const G_MAJOR_ALL = [].concat(G_MAJOR[1], G_MAJOR[2], G_MAJOR[3], G_MAJOR[4], G_MAJOR[5]);

  function playActionCompleted(deviceType, actionIndex) {
    if (isMuted()) return;
    const baseOctave = deviceType === 'QC' ? 1 : deviceType === 'RTG' ? 2 : 3;
    const baseOffset = (baseOctave - 1) * 7;
    const idx = Math.min(baseOffset + actionIndex, G_MAJOR_ALL.length - 1);
    const ac = getCtx();
    playTone(G_MAJOR_ALL[idx], 0.4, ac.currentTime);
  }

  function playBeep(freq, startTime) {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const osc2 = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'triangle';
    osc2.type = 'triangle';
    osc.frequency.value = freq;
    osc2.frequency.value = freq + 3;
    gain.gain.setValueAtTime(0.14, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.12);
    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(ac.destination);
    osc.start(startTime);
    osc2.start(startTime);
    osc.stop(startTime + 0.12);
    osc2.stop(startTime + 0.12);
  }

  function playDelaySound(totalDelaySeconds) {
    if (isMuted()) return;
    if (totalDelaySeconds <= 0) {
      playChord([G_MAJOR[1][0], G_MAJOR[1][2], G_MAJOR[1][4]], 0.6);
      return;
    }
    const ac = getCtx();
    const now = ac.currentTime;
    const beeps = Math.min(Math.ceil(totalDelaySeconds / 240), 5);
    const freqs = [440, 554, 659, 784, 988];
    const freq = freqs[beeps - 1];
    for (let i = 0; i < beeps; i++) {
      playBeep(freq, now + i * 0.18);
    }
  }

  return { playActionCompleted, playDelaySound, isMuted };
})();

window._prevCompletedActionIds = new Set();

setInterval(() => {
  const state = window._lastState;
  if (!state || _sound.isMuted()) return;
  const schedules = state.schedules || [];
  let maxDelay = 0;
  for (const s of schedules) {
    const d = s.totalDelaySeconds || 0;
    if (d > maxDelay) maxDelay = d;
  }
  _sound.playDelaySound(maxDelay);
}, 15000);

async function refreshState() {
  const state = await apiCall('/api/state?schedulePage=' + window._schedulePage + '&schedulePageSize=' + window._schedulePageSize);
  window._lastState = state;
  document.querySelectorAll('[data-refresh]').forEach(el => el.refresh(state));
}

// --- SSE live connection ---
let _sseStatus = 'disconnected';
function updateConnectionIndicator() {
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  if (!dot || !label) return;
  if (_sseStatus === 'connected') {
    dot.style.background = '#22c55e';
    label.textContent = 'Live';
  } else if (_sseStatus === 'reconnecting') {
    dot.style.background = '#f59e0b';
    label.textContent = 'Reconnecting';
  } else {
    dot.style.background = '#ef4444';
    label.textContent = 'Disconnected';
  }
}

function connectSSE() {
  const es = new EventSource(API + '/api/events');
  es.onopen = () => {
    _sseStatus = 'connected';
    updateConnectionIndicator();
  };
  es.addEventListener('state', (e) => {
    try {
      const state = JSON.parse(e.data);
      window._lastState = state;
      document.querySelectorAll('[data-refresh]').forEach(el => el.refresh(state));
    } catch (err) { /* ignore parse errors */ }
  });
  es.onerror = () => {
    _sseStatus = 'reconnecting';
    updateConnectionIndicator();
  };
  return es;
}
connectSSE();

fetch(API + '/api/version').then(r => r.json()).then(data => {
  document.querySelectorAll('#app-title').forEach(el => { el.textContent = 'FES v' + data.version; });
  document.querySelectorAll('#app-title').forEach(el => { el.href = API + '/release-notes'; });
  document.title = 'FES v' + data.version + ' - System Status';
}).catch(() => {});

// --- Header Component ---
class ScheduleHeader extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:header;background:var(--surface);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)';
    this.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px">
        <a href="#" style="font-size:18px;font-weight:bold;color:var(--text);text-decoration:none" id="app-title">FES</a>
        <span style="color:var(--text-muted);font-size:13px">System Status</span>
        <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)">
          <span id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block"></span>
          <span id="live-label">Disconnected</span>
        </span>
        <span id="kafka-status" style="display:none;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600"></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-muted)">FES System Time:</span>
        <span id="clock" style="font-family:monospace;font-size:20px;color:var(--qc-color)">00:00:00</span>
      </div>`;
    this.setAttribute('data-refresh', '');
  }
  refresh(state) {
    const t = state.currentTime;
    if (t) {
      const d = new Date(t);
      this.querySelector('#clock').textContent = d.toISOString().substring(11, 19);
    }
    const ks = state.kafkaStatus;
    const badge = document.getElementById('kafka-status');
    if (ks && badge) {
      badge.style.display = '';
      if (ks.allReady) {
        badge.style.background = 'rgba(5,150,105,0.15)';
        badge.style.color = '#059669';
        badge.textContent = 'Kafka ' + ks.ready + '/' + ks.total;
      } else {
        badge.style.background = 'rgba(234,88,12,0.15)';
        badge.style.color = '#ea580c';
        badge.textContent = 'Kafka ' + ks.ready + '/' + ks.total;
      }
      badge.title = ks.ready + ' of ' + ks.total + ' consumers ready';
    }
  }
  async tick(seconds) {
    await apiCall('/api/tick', { seconds });
    refreshState();
  }
  async _playTick() {
    const resolution = parseInt(this.querySelector('#play-resolution').value) || 1;
    await apiCall('/api/tick', { seconds: resolution });
    await refreshState();
  }
  async exportLog() {
    const res = await fetch(API + '/api/event-log/export');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'event-log.json';
    a.click();
    URL.revokeObjectURL(url);
  }
  importLog() {
    const fileInput = this.querySelector('#import-file');
    fileInput.value = '';
    fileInput.onchange = async () => {
      const file = fileInput.files[0];
      if (!file) return;
      const text = await file.text();
      await fetch(API + '/api/event-log/import', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: text
      });
      refreshState();
    };
    fileInput.click();
  }
  togglePlay() {
    if (this._playTimer) {
      clearInterval(this._playTimer);
      this._playTimer = null;
      this.querySelector('#play-btn').innerHTML = '&#9654; Play';
      refreshState();
      return;
    }
    this.querySelector('#play-btn').innerHTML = '&#9724; Stop';
    const speed = () => parseFloat(this.querySelector('#play-speed').value) || 1;
    const resolution = () => parseInt(this.querySelector('#play-resolution').value) || 1;
    const intervalMs = () => Math.round(resolution() * 1000 / speed());
    let pending = false;
    const doTick = async () => {
      if (pending) return;
      pending = true;
      try {
        await this._playTick();
      } finally {
        pending = false;
      }
    };
    doTick();
    this._playTimer = setInterval(doTick, intervalMs());
    const speedInput = this.querySelector('#play-speed');
    const onSpeedChange = () => {
      if (!this._playTimer) return;
      clearInterval(this._playTimer);
      this._playTimer = setInterval(doTick, intervalMs());
    };
    speedInput.addEventListener('input', onSpeedChange);
    this._speedCleanup = () => speedInput.removeEventListener('input', onSpeedChange);
  }
}
customElements.define('schedule-header', ScheduleHeader);

// --- Collapsible Navigation Sidebar ---
class NavSidebar extends HTMLElement {
  connectedCallback() {
    this.classList.add('sidebar');
    this.setAttribute('data-refresh', '');
    this.innerHTML = `
      <button class="sidebar-toggle" onclick="this.closest('nav-sidebar').toggle()">
        &#9776; <span>Navigation</span>
      </button>
      <div class="sidebar-content">
        <div class="section-label">Operations</div>
        <button onclick="window.open(API+'/workinstructions','_blank')">&#9776; Work Instructions <span id="wi-count" class="nav-badge" style="display:none"></span></button>
        <button onclick="window.open(API+'/workqueues','_blank')">&#9776; Work Queues <span id="wq-count" class="nav-badge" style="display:none"></span></button>
        <button onclick="window.open(API+'/trucks','_blank')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="8" width="14" height="8" rx="1"/><path d="M15 12h4l3 3v1h-7z"/><circle cx="6" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><line x1="8" y1="16" x2="17" y2="16"/></svg> Trucks <span id="truck-count" class="nav-badge" style="display:none"></span></button>
        <button onclick="window.open(API+'/quaycranes','_blank')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="7" y2="22"/><line x1="15" y1="22" x2="19" y2="22"/><line x1="5" y1="22" x2="5" y2="8"/><line x1="17" y1="22" x2="17" y2="8"/><line x1="5" y1="8" x2="17" y2="8"/><rect x="7" y="5" width="8" height="3" rx="0.5"/><line x1="11" y1="5" x2="11" y2="2"/><line x1="11" y1="2" x2="23" y2="2"/><line x1="11" y1="5" x2="1" y2="3"/></svg> Quay Cranes <span id="qc-count" class="nav-badge" style="display:none"></span></button>
        <button onclick="window.open(API+'/locations','_blank')">&#9678; Locations <span id="loc-count" class="nav-badge nav-badge-orange" style="display:none"></span></button>
        <button onclick="window.open(API+'/pathfinder','_blank')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1,6 9,2 15,6 23,2 23,18 15,22 9,18 1,22"/><line x1="9" y1="2" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="22"/></svg> Pathfinder <span id="pf-count" class="nav-badge" style="display:none"></span></button>

        <div class="section-label">System</div>
        <button onclick="window.open(API+'/dlq','_blank')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l10 6 10-6"/><rect x="2" y="6" width="20" height="14" rx="1"/><path d="M6 2l2 4M10 1l1 5M14 1l-1 5M18 2l-2 4"/></svg> Dead Letter Queue <span id="dlq-count" class="nav-badge nav-badge-red" style="display:none"></span></button>
        <button onclick="window.open(API+'/release-notes','_blank')">&#128196; Release Notes</button>

        <div class="section-label">Simulator</div>
        <button onclick="window.open(API+'/containermovestate','_blank')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="16" height="12" rx="1"/><line x1="6" y1="6" x2="6" y2="18"/><line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="6" x2="14" y2="18"/><path d="M18 15l3-3-3-3"/></svg> Container Move State</button>
        <button onclick="window.open(API+'/schedule-viewer','_blank')">&#128200; Schedule Viewer</button>
        <button onclick="window.open(API+'/editor','_blank')">&#9998; Editor</button>
      </div>`;
  }
  refresh(state) {
    const steps = state.steps || [];
    const wiMap = new Map();
    for (const step of steps) {
      const evt = step.event;
      if (evt && evt.type === 'WorkInstructionEvent') {
        wiMap.set(evt.workInstructionId, evt.workInstructionMoveStage || '');
      }
      if (evt && evt.type === 'NukeWorkQueueEvent') {
        const nukedWqId = Number(evt.workQueueId);
        for (const [id, ms] of wiMap) {
          if (Number(step.event.workQueueId) === nukedWqId) wiMap.delete(id);
        }
      }
    }
    let activeCount = 0;
    for (const [, ms] of wiMap) {
      if (ms !== 'Complete' && ms !== 'Cancelled') activeCount++;
    }
    const badge = this.querySelector('#wi-count');
    if (badge) {
      if (activeCount > 0) {
        badge.style.display = '';
        badge.textContent = activeCount;
      } else {
        badge.style.display = 'none';
      }
    }

    const wqMap = new Map();
    for (const step of steps) {
      const evt = step.event;
      if (evt && evt.type === 'WorkQueueMessage') {
        wqMap.set(evt.workQueueId, evt.workQueueManaged || '');
      }
      if (evt && evt.type === 'NukeWorkQueueEvent') {
        wqMap.delete(evt.workQueueId);
      }
    }
    let fesCount = 0;
    for (const [, managed] of wqMap) {
      if (managed === 'FES4') fesCount++;
    }
    const wqBadge = this.querySelector('#wq-count');
    if (wqBadge) {
      if (fesCount > 0) {
        wqBadge.style.display = '';
        wqBadge.textContent = fesCount;
      } else {
        wqBadge.style.display = 'none';
      }
    }

    const rawTrucks = state.trucks || {};
    let truckCount = 0;
    for (const truck of Object.values(rawTrucks)) {
      if (Number(truck.chePoolId) === 23) truckCount++;
    }
    const truckBadge = this.querySelector('#truck-count');
    if (truckBadge) {
      if (truckCount > 0) {
        truckBadge.style.display = '';
        truckBadge.textContent = truckCount;
      } else {
        truckBadge.style.display = 'none';
      }
    }

    const quayCranes = state.quayCranes || {};
    const craneDelays = state.craneDelays || {};
    let qcCount = 0;
    for (const [name, qc] of Object.entries(quayCranes)) {
      const hasStandby = qc.standbyPositionName && qc.standbyPositionName.trim() !== '';
      const delays = craneDelays[name] || [];
      let noDelay = true;
      if (delays.length > 0) {
        const last = delays[delays.length - 1];
        const status = (last.delayStatus || '').toUpperCase();
        const action = (last.delayTypeAction || '').toUpperCase();
        const eventType = (last.eventType || '').toUpperCase();
        const stopped = status.includes('STOPPED') || action === 'CONTAINER_MOVE_ACTIVE' || eventType.includes('STOPPED');
        if (!stopped) noDelay = false;
      }
      if (hasStandby && noDelay) qcCount++;
    }
    const locOccupancy = state.locationOccupancy || [];
    const locBadge = this.querySelector('#loc-count');
    if (locBadge) {
      if (locOccupancy.length > 0) {
        locBadge.style.display = '';
        locBadge.textContent = locOccupancy.length;
      } else {
        locBadge.style.display = 'none';
      }
    }

    const qcBadge = this.querySelector('#qc-count');
    if (qcBadge) {
      if (qcCount > 0) {
        qcBadge.style.display = '';
        qcBadge.textContent = qcCount;
      } else {
        qcBadge.style.display = 'none';
      }
    }
  }
  toggle() {
    this.classList.toggle('collapsed');
  }
}
customElements.define('nav-sidebar', NavSidebar);

// --- Schedule View (Center Panel) ---
class ScheduleView extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:center;overflow:auto;position:relative;background:var(--bg)';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this._pxPerSec = 3;
    this.innerHTML = '<h2 style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">Schedule <label style="font-size:11px;font-weight:400;display:flex;align-items:center;gap:6px;color:var(--text-muted)">Scale <input id="scale-slider" type="range" min="3" max="50" value="3" style="width:80px"> <span id="scale-val">3</span>px/s</label><span id="schedule-pager" style="font-size:12px;font-weight:400;display:flex;align-items:center;gap:6px;margin-left:auto"></span></h2><div id="schedule-content"><p style="color:var(--text-muted)">No schedules yet. Add work instructions and activate a work queue.</p></div>';
    this.querySelector('#scale-slider').addEventListener('input', e => {
      this._pxPerSec = parseInt(e.target.value);
      this.querySelector('#scale-val').textContent = this._pxPerSec;
      this.refresh(window._lastState || {});
    });
  }
  refresh(state) {
    const newCompleted = new Set();
    for (const s of (state.schedules || [])) {
      const containerDeviceActions = {};
      for (const takt of (s.takts || [])) {
        for (const action of (takt.actions || [])) {
          const key = action.containerIndex + ':' + action.deviceType;
          if (!containerDeviceActions[key]) containerDeviceActions[key] = [];
          containerDeviceActions[key].push(action);
        }
      }
      for (const takt of (s.takts || [])) {
        for (const action of (takt.actions || [])) {
          if (action.status === 'COMPLETED') {
            newCompleted.add(action.id);
            if (!window._prevCompletedActionIds.has(action.id)) {
              const key = action.containerIndex + ':' + action.deviceType;
              const actions = containerDeviceActions[key] || [];
              const actionIdx = actions.findIndex(a => a.id === action.id);
              _sound.playActionCompleted(action.deviceType, Math.max(0, actionIdx));
            }
          }
        }
      }
    }
    window._prevCompletedActionIds = newCompleted;

    const container = this.querySelector('#schedule-content');
    const schedules = state.schedules || [];
    const totalSchedules = state.totalSchedules || schedules.length;
    const page = state.schedulePage || 0;
    const pageSize = state.schedulePageSize || 5;
    const totalPages = Math.max(1, Math.ceil(totalSchedules / pageSize));

    const pager = this.querySelector('#schedule-pager');
    if (totalSchedules > pageSize) {
      pager.innerHTML = '<button class="secondary" id="sched-prev" style="padding:2px 8px;font-size:11px"' + (page <= 0 ? ' disabled' : '') + '>&lt;</button>'
        + '<span style="color:var(--text-muted)">' + (page + 1) + ' / ' + totalPages + ' (' + totalSchedules + ' WQs)</span>'
        + '<button class="secondary" id="sched-next" style="padding:2px 8px;font-size:11px"' + (page >= totalPages - 1 ? ' disabled' : '') + '>&gt;</button>';
      pager.querySelector('#sched-prev').onclick = () => { window._schedulePage = Math.max(0, page - 1); refreshState(); };
      pager.querySelector('#sched-next').onclick = () => { window._schedulePage = Math.min(totalPages - 1, page + 1); refreshState(); };
    } else if (totalSchedules > 0) {
      pager.innerHTML = '<span style="color:var(--text-muted)">' + totalSchedules + ' WQ' + (totalSchedules > 1 ? 's' : '') + '</span>';
    } else {
      pager.innerHTML = '';
    }

    if (schedules.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted)">No schedules yet. Add work instructions and activate a work queue.</p>';
      return;
    }

    const deviceColors = { RTG: 'var(--rtg-color)', TT: 'var(--tt-color)', QC: 'var(--qc-color)' };
    const scale = this._pxPerSec || 3;

    let html = '';
    for (const schedule of schedules) {
      html += '<div style="margin-bottom:20px">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
      html += '<strong>' + schedule.workQueueId + '</strong>';
      if (schedule.estimatedMoveTime) {
        html += '<span style="font-size:12px;color:var(--text-muted)">EMT: ' + schedule.estimatedMoveTime + '</span>';
      }
      const totalDelay = schedule.totalDelaySeconds || 0;
      if (totalDelay > 0) {
        html += '<span style="font-size:12px;font-weight:600;color:#ef4444;background:rgba(239,68,68,0.15);padding:2px 8px;border-radius:4px">DELAY: +' + totalDelay + 's</span>';
      } else {
        html += '<span style="font-size:12px;font-weight:600;color:var(--completed);background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:4px">ON TIME</span>';
      }
      html += '</div>';

      const takts = schedule.takts || [];
      if (takts.length === 0) { html += '</div>'; continue; }

      const LANE_COUNT = 7;
      const containerIndices = new Set();
      for (const takt of takts) {
        for (const action of takt.actions || []) {
          if (action.deviceType === 'RTG' || action.deviceType === 'TT') {
            containerIndices.add(action.containerIndex != null ? action.containerIndex : 0);
          }
        }
      }
      const sortedContainers = [...containerIndices].sort((a, b) => a - b);
      const containerSlot = {};
      sortedContainers.forEach((ci, i) => { containerSlot[ci] = i % LANE_COUNT; });
      const actualLanes = Math.min(LANE_COUNT, sortedContainers.length);

      const colDefs = takts.map(t => { const d = t.durationSeconds || 120; return 'minmax(' + Math.round(d * scale) + 'px,' + d + 'fr)'; }).join(' ');
      const currentTime = state.currentTime ? new Date(state.currentTime).getTime() : 0;
      const firstTaktStart = takts[0].plannedStartTime ? new Date(takts[0].plannedStartTime).getTime() : 0;
      const totalScheduleSeconds = takts.reduce((sum, t) => sum + (t.durationSeconds || 120), 0);
      const elapsedSeconds = (currentTime - firstTaktStart) / 1000;
      const timeLinePx = Math.round(elapsedSeconds * scale) + 56;

      html += '<div style="position:relative;display:inline-block;min-width:100%">';
      if (elapsedSeconds >= 0 && elapsedSeconds <= totalScheduleSeconds) {
        html += '<div style="position:absolute;left:' + timeLinePx + 'px;top:0;bottom:0;width:2px;background:#ef4444;z-index:3;pointer-events:none"></div>';
      }
      html += '<div style="display:inline-grid;grid-template-columns:56px ' + colDefs + ';gap:1px;min-width:100%">';

      html += '<div style="background:var(--surface2);padding:4px;position:sticky;left:0;z-index:2"></div>';
      for (const takt of takts) {
        const ts = takt.status || 'WAITING';
        const tc = ts === 'ACTIVE' ? 'var(--active)' : ts === 'COMPLETED' ? 'var(--completed)' : 'var(--pending)';
        html += '<div style="background:var(--surface2);padding:4px 6px;text-align:center;border-bottom:2px solid ' + tc + '">';
        html += '<div style="font-size:11px;color:var(--text-muted)">' + takt.name;
        const conditions = takt.conditions || [];
        const unsatisfied = conditions.filter(c => !c.satisfied);
        if (ts === 'WAITING' && conditions.length > 0) {
          const condColor = unsatisfied.length > 0 ? '#ef4444' : 'var(--completed)';
          html += ' <span class="conditions-btn" data-takt="' + takt.name + '" data-wq="' + schedule.workQueueId + '" data-conditions="' + encodeURIComponent(JSON.stringify(conditions)) + '" style="cursor:pointer;font-size:12px;vertical-align:middle;color:' + condColor + '" title="' + unsatisfied.length + ' condition(s) blocking">&#9881;</span>';
        }
        html += '</div>';
        html += '<div style="font-size:9px;font-weight:600;color:' + tc + '">' + ts + '</div>';
        const fmtTime = t => t ? new Date(t).toISOString().substring(11, 19) : '--:--:--';
        html += '<div style="font-size:9px;color:var(--text-muted);margin-top:2px;line-height:1.4">';
        html += 'P: ' + fmtTime(takt.plannedStartTime) + '<br>';
        html += 'E: ' + fmtTime(takt.estimatedStartTime) + '<br>';
        html += '<span style="color:' + (takt.actualStartTime ? 'var(--completed)' : 'var(--text-muted)') + '">A: ' + fmtTime(takt.actualStartTime) + '</span>';
        html += '</div>';
        if (takt.actualStartTime) {
          const startDel = takt.startDelaySeconds || 0;
          const taktDel = takt.taktDelaySeconds || 0;
          html += '<div style="font-size:9px;margin-top:3px;line-height:1.3">';
          html += '<span style="color:' + (startDel > 0 ? '#ef4444' : 'var(--completed)') + '">start: ' + (startDel > 0 ? '+' + startDel + 's' : '0s') + '</span><br>';

            html += '<span style="color:' + (taktDel > 0 ? '#ef4444' : 'var(--completed)') + '">exec: ' + (taktDel > 0 ? '+' + taktDel + 's' : '0s') + '</span>';
          } else if (ts === 'ACTIVE') {
            html += '<span style="color:var(--text-muted)">exec: ...</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      }

      html += '<div style="background:var(--surface2);padding:4px;display:flex;align-items:center;justify-content:center;position:sticky;left:0;z-index:1">';
      html += '<span style="background:' + deviceColors.QC + ';color:white;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600">QC</span>';
      html += '</div>';
      for (const takt of takts) {
        const cellActions = (takt.actions || []).filter(a => a.deviceType === 'QC');

        for (const action of cellActions) {
          html += this._renderAction(action, schedule.workQueueId, scale);
        }
        html += '</div>';
      }

      const rtgDeviceIndices = new Set();
      for (const takt of takts) {
        for (const action of takt.actions || []) {
          if (action.deviceType === 'RTG') {
            rtgDeviceIndices.add(action.deviceIndex != null ? action.deviceIndex : 0);
          }
        }
      }
      const hasMultipleRtgDevices = rtgDeviceIndices.size > 1;
      const sortedRtgDeviceIndices = [...rtgDeviceIndices].sort((a, b) => a - b);
      const rtgDeviceA = sortedRtgDeviceIndices[0] ?? 0;
      const rtgDeviceB = sortedRtgDeviceIndices[1] ?? -1;

      const SRH = 60;
      const rtgSubRows = hasMultipleRtgDevices ? 2 : 1;
      const subRowCount = rtgSubRows + 1;
      const laneHeight = SRH * subRowCount + (subRowCount - 1);

      for (let lane = 0; lane < actualLanes; lane++) {
        const laneSlot = lane;
        const matchLane = a => containerSlot[a.containerIndex != null ? a.containerIndex : 0] === laneSlot;

        html += '<div style="background:var(--surface2);padding:2px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:sticky;left:0;z-index:1;gap:1px;height:' + laneHeight + 'px">';
        if (hasMultipleRtgDevices) {
          html += '<span style="background:' + deviceColors.RTG + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">RTG A</span>';

        } else {
          html += '<span style="background:' + deviceColors.RTG + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">RTG</span>';
        }
        html += '<span style="background:' + deviceColors.TT + ';color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">TT</span>';
        html += '</div>';

        for (const takt of takts) {
          const laneActions = (takt.actions || []).filter(matchLane);

            const cellFirstIdx = cellRtgIndices[0];
            const rtgA = allRtg.filter(a => (a.deviceIndex != null ? a.deviceIndex : 0) === cellFirstIdx);
            const rtgB = allRtg.filter(a => (a.deviceIndex != null ? a.deviceIndex : 0) !== cellFirstIdx);
            html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch;border-bottom:1px solid var(--surface2)">';
            for (const action of rtgA) html += this._renderAction(action, schedule.workQueueId, scale);
            html += '</div>';
            html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch;border-bottom:1px solid var(--surface2)">';
            for (const action of rtgB) html += this._renderAction(action, schedule.workQueueId, scale);

          } else {
            const rtgActions = laneActions.filter(a => a.deviceType === 'RTG');

            for (const action of rtgActions) html += this._renderAction(action, schedule.workQueueId, scale);
            html += '</div>';
          }

          html += '<div style="display:flex;flex-direction:row;gap:0;height:' + SRH + 'px;align-items:stretch">';
          for (const action of ttActions) html += this._renderAction(action, schedule.workQueueId, scale);
          html += '</div>';
          html += '</div>';
        }

            let cHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong style="font-size:13px">Conditions for "' + actionDesc + '"</strong><span style="cursor:pointer;font-size:15px;line-height:1;color:var(--text-muted);padding:0 2px" onclick="this.closest(\'.conditions-popup\').remove()">&#10005;</span></div>';

              const label = cond.type === 'TAKT_ACTIVATION' ? 'Takt Activation' : 'Action Dependencies';

          const label = cond.type === 'TIME' ? 'Start Time' : 'Dependencies';

          popupHtml += '<div style="padding:6px 0;border-top:1px solid var(--border)">';
          popupHtml += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">';
          popupHtml += '<span>' + icon + ' <strong>' + label + '</strong></span>';
          popupHtml += '</div>';
          if (cond.explanation) {
            popupHtml += '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;word-break:break-word">' + cond.explanation + '</div>';
          }
          if (cond.overridden) {
            popupHtml += '<div style="font-size:10px;color:var(--tt-color);margin-top:2px">Overridden</div>';
          }
          popupHtml += '</div>';
        }

        popup.innerHTML = popupHtml;
        self.appendChild(popup);

      });
    });
  }
  _renderAction(action, wqId, scale) {
    const ci = action.containerIndex != null ? action.containerIndex : 0;
    const rawHue = (ci * 137) % 360;
    const safeHues = [210, 270, 45, 190, 300, 170, 55, 240, 320, 200];
    const containerHue = safeHues[ci % safeHues.length] || ((rawHue >= 80 && rawHue <= 160) || rawHue >= 340 || rawHue <= 20 ? (rawHue + 180) % 360 : rawHue);
    const containerColor = 'hsl(' + containerHue + ',65%,45%)';

    let bgColor, borderColor, textOpacity, statusLabel, extraStyle = '';
    if (action.status === 'COMPLETED' && action.completionReason) {
      bgColor = '#e2e8f0';
      borderColor = '#94a3b8';
      textOpacity = '0.6';
      extraStyle = 'background-image:repeating-linear-gradient(135deg,transparent,transparent 4px,#94a3b8 4px,#94a3b8 5px);';
      statusLabel = '<span class="completion-reason-btn" data-completion-reason="' + action.completionReason.replace(/"/g, '&quot;') + '" style="cursor:pointer;color:#d97706" title="' + action.completionReason + '">&#9888;</span>';
    } else if (action.status === 'COMPLETED') {
      bgColor = '#d1fae5'; borderColor = 'var(--completed)'; textOpacity = '0.9';
      statusLabel = '<span style="color:var(--completed)">&#10003;</span>';
    } else if (action.status === 'ACTIVE') {
      bgColor = '#fed7aa'; borderColor = 'var(--active)'; textOpacity = '1';
      statusLabel = '<span style="color:#9a3412">&#9654;</span>';
    } else {
      bgColor = '#ffffff'; borderColor = '#cbd5e1'; textOpacity = '0.85';
      statusLabel = '<span style="color:var(--pending)">&#9679;</span>';
    }

    const dur = action.durationSeconds || 30;
    const widthPx = Math.round(dur * scale);
    const narrow = widthPx < 30;

    const actionConditions = action.conditions || [];
    const actionUnsatisfied = actionConditions.filter(c => !c.satisfied);
    let conditionsIcon = '';
    if (action.status === 'PENDING' && actionConditions.length > 0) {
      const acondColor = actionUnsatisfied.length > 0 ? '#ef4444' : 'var(--completed)';
      conditionsIcon = ' <span class="action-conditions-btn" data-action-id="' + action.id + '" data-action-desc="' + action.description.replace(/"/g, '&quot;') + '" data-wq="' + wqId + '" data-conditions="' + encodeURIComponent(JSON.stringify(actionConditions)) + '" style="cursor:pointer;font-size:10px;color:' + acondColor + '" title="' + actionUnsatisfied.length + ' condition(s) blocking">&#9881;</span>';
    }

    const containerLabel = (action.containerIds && action.containerIds.length > 0) ? action.containerIds.join(', ') : 'C' + ci;
    const truckLabel = action.cheShortName ? ' <span style="font-size:9px;color:#9a3412;font-weight:600" title="Assigned truck">' + action.cheShortName + '</span>' : '';
    let innerHtml = '<div style="display:flex;align-items:center;gap:3px;font-size:9px;font-weight:600;min-width:0">' + statusLabel + ' <span title="' + containerLabel + '" style="color:' + containerColor + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + containerLabel + '</span>' + truckLabel + conditionsIcon + '</div><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + action.description + '</div>';

    let h = '<div style="position:relative;background:' + bgColor + ';' + extraStyle + 'border:1px solid ' + borderColor + ';border-top:3px solid ' + containerColor + ';border-radius:4px;padding:' + (narrow ? '1px 2px' : '3px 5px') + ';opacity:' + textOpacity + ';font-size:11px;min-width:' + widthPx + 'px;width:' + widthPx + 'px;box-sizing:border-box;flex-shrink:0;overflow:hidden;cursor:' + (narrow ? 'pointer' : 'default') + '"' + (narrow ? ' data-popup-html="' + innerHtml.replace(/"/g, '&quot;') + '" data-popup-bg="' + bgColor + '" data-popup-border="' + borderColor + '" data-popup-container="' + containerColor + '"' : '') + '>';
    if (!narrow) {
      h += innerHtml;
    }
    h += '</div>';
    return h;
  }
}
customElements.define('schedule-view', ScheduleView);

// --- Timeline Panel ---
class TimelinePanel extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:right';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this.innerHTML = '<h2 style="display:flex;align-items:center;gap:12px">Timeline <label style="font-size:12px;font-weight:400;display:flex;align-items:center;gap:4px;color:var(--text-muted)"><input id="hide-ticks" type="checkbox" checked> Hide time events</label></h2><div id="timeline-content"></div>';
    this.querySelector('#hide-ticks').addEventListener('change', () => { if (window._lastState) this.refresh(window._lastState); });
  }
  refresh(state) {
    const container = this.querySelector('#timeline-content');
    const steps = state.steps || [];
    const totalSteps = state.totalSteps || steps.length;
    if (steps.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No events yet.</p>';
      return;
    }

    const hideTicks = this.querySelector('#hide-ticks').checked;
    const snapshotStep = state.snapshotStep ?? -1;

    let html = '';
    if (totalSteps > steps.length) {
      html += '<div style="color:var(--text-muted);font-size:11px;padding:4px 0;margin-bottom:4px;border-bottom:1px solid var(--border)">Showing last ' + steps.length + ' of ' + totalSteps + ' events</div>';
    }
    for (let i = steps.length - 1; i >= 0; i--) {
      const step = steps[i];
      if (hideTicks && step.description && (step.description.startsWith('Tick ') || step.description === 'System time set')) continue;
      const effectCount = (step.sideEffects || []).length;
      const isSnapshot = step.stepNumber === snapshotStep;
      html += '<div style="padding:8px 10px;margin-bottom:4px;border-radius:4px;cursor:default;'
           + 'border:1px solid ' + (isSnapshot ? 'var(--active)' : 'var(--border)') + ';font-size:13px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<span>';
      if (isSnapshot) html += '<span style="color:var(--active);font-size:10px;margin-right:4px">SNAPSHOT</span>';
      html += '<strong style="color:var(--text-muted)">#' + step.stepNumber + '</strong> ' + step.description + '</span>';
      if (effectCount > 0) {
        html += '<span style="background:var(--active);color:white;font-size:10px;padding:1px 6px;border-radius:10px">' + effectCount + '</span>';
      }
      html += '</div></div>';
    }
    container.innerHTML = html;

  }
}
customElements.define('timeline-panel', TimelinePanel);

// --- Side Effects Log ---
class SideEffectsLog extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'grid-area:bottom;max-height:160px';
    this.classList.add('panel');
    this.setAttribute('data-refresh', '');
    this.innerHTML = '<h2>Side Effects</h2><div id="effects-content" style="font-family:monospace;font-size:12px;overflow-y:auto;max-height:110px"></div>';
  }
  refresh(state) {
    const container = this.querySelector('#effects-content');
    const steps = state.steps || [];
    let html = '';
    for (const step of steps) {
      for (const effect of step.sideEffects || []) {
        const typeColor = effect.type === 'ActionActivated' ? 'var(--active)' :
                          effect.type === 'ActionCompleted' ? 'var(--completed)' :
                          effect.type === 'TaktActivated' ? '#8b5cf6' :
                          effect.type === 'TaktCompleted' ? '#a78bfa' :
                          effect.type === 'ScheduleCreated' ? 'var(--qc-color)' :
                          effect.type === 'ScheduleAborted' ? '#ef4444' : 'var(--text-muted)';
        html += '<div style="padding:2px 0;border-bottom:1px solid var(--bg)">';
        html += '<span style="color:var(--text-muted)">#' + step.stepNumber + '</span> ';
        html += '<span style="color:' + typeColor + '">' + effect.type + '</span>';

        if (effect.workQueueId) html += ' <span style="color:var(--text-muted)">' + effect.workQueueId + '</span>';
        if (effect.taktName) html += ' ' + effect.taktName;
        if (effect.actionDescription) html += ' "' + effect.actionDescription + '"';
        html += '</div>';
      }
    }
    container.innerHTML = html || '<span style="color:var(--text-muted)">No side effects yet.</span>';
    container.scrollTop = container.scrollHeight;
  }
}
customElements.define('side-effects-log', SideEffectsLog);

refreshState();

fetch(API + '/api/digitalmap').then(r => r.json()).then(data => {
  const count = (data.pois || []).length;
  const badge = document.getElementById('pf-count');
  if (badge && count > 0) {
    badge.style.display = '';
    badge.textContent = count;
  }
}).catch(() => {});

function refreshDlqCount() {
  fetch(API + '/api/dlq').then(r => r.json()).then(data => {
    const badge = document.getElementById('dlq-count');
    if (badge) {
      if (data.count > 0) {
        badge.style.display = '';
        badge.textContent = data.count;
      } else {
        badge.style.display = 'none';
      }
    }
  }).catch(() => {});
}
refreshDlqCount();
setInterval(refreshDlqCount, 15000);
