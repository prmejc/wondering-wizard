# =============================================================================
# Terminal Simulator - DEV Settings
# =============================================================================
# Use different consumer group IDs to avoid stealing messages from production.
# Run with: SIMULATOR_SETTINGS_FILE=simulator-dev-settings.properties
# =============================================================================

# Kafka broker connection
kafka.bootstrap-server=kafka-broker-service:9093
kafka.schema-registry-url=http://kafka-schema-registry-service:8081

# SASL authentication
kafka.security-protocol=SASL_PLAINTEXT
kafka.sasl-mechanism=PLAIN
kafka.sasl-username=admin
kafka.sasl-password=admin-secret

# Consumer groups (suffixed with -dev to avoid conflicts)
kafka.consumer.group-id=apmt.tc1.sit.terminal-operations.terminal-simulator.consumergroup.v1-dev
kafka.consumer.wi-group-id=apmt.tc1.sit.terminal-operations.terminal-simulator-wi.consumergroup.v1-dev

# Terminal
terminal.code=MAPTM
